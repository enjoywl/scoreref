<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Live football scores, match results, fixtures, and real-time updates. Track your favorite football matches worldwide." />
    <meta name="keywords" content="football, live score, soccer, match results, fixtures, real-time scores" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.scoreref.com" />
    <link rel="alternate" hreflang="en" href="https://www.scoreref.com" />
    <link rel="alternate" hreflang="zh-CN" href="https://www.scoreref.com/?lang=zh-CN" />

    <!-- Open Graph -->
    <meta property="og:title" content="ScoreRef — Live Football Scores" />
    <meta property="og:description" content="Live football scores, match results, fixtures, and real-time updates." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.scoreref.com" />
    <meta property="og:site_name" content="ScoreRef" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="zh_CN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ScoreRef — Live Football Scores" />
    <meta name="twitter:description" content="Live football scores, match results, fixtures, and real-time updates." />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ScoreRef",
      "url": "https://www.scoreref.com",
      "description": "Live football scores and match results",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.scoreref.com/?q={search_term}",
        "query-input": "required name=search_term"
      }
    }
    </script>

    <title>ScoreRef — Live Football Scores</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
